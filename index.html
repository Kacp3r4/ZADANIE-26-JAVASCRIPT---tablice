<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Zadania</title>
    <style>
        body { 
            font-family: Arial; padding: 20px; 
        }

        button { 
            padding: 10px; margin: 10px 0; cursor: pointer;
         }

        pre { 
            background: #eee; padding: 15px; border: 1px solid #ccc; white-space: pre-wrap; 
        }
    </style>
</head>
<body>

    <h2>Zadania z tablicami</h2>
    
    <p>Podaj liczbę a (do szukania najbliższej):</p>
    <input type="number" id="liczbaA" value="20">
    <br>
    <button onclick="robTablice()">WYKONAJ WSZYSTKO</button>

    <pre id="wynik"></pre>

<script>
function robTablice() {
    let out = document.getElementById('wynik');
    out.innerText = "Przetwarzanie...\n\n";

    let A = [];
    for(let i=0; i<100; i++) {
        A.push(Math.floor(Math.random() * 101));
    }


    let max = Math.max(...A);
    let ileMax = 0;
    for(let x of A) if(x === max) ileMax++;
    out.innerText += "Najwieksza: " + max + " (bylo ich: " + ileMax + ")\n";


    let nieparz = A.filter(x => x % 2 !== 0);
    out.innerText += "Nieparzyste: " + nieparz.join(", ") + "\n\n";

    let nieparzIndeksy = [];
    for(let i=1; i<A.length; i+=2) nieparzIndeksy.push(A[i]);
    out.innerText += "Liczby na nieparzystych indeksach: " + nieparzIndeksy.join(", ") + "\n\n";

 
    let przedzial = A.filter(x => x >= 5 && x < 15);
    out.innerText += "Liczby <5, 15): " + przedzial.join(", ") + "\n\n";


    let a = parseInt(document.getElementById('liczbaA').value);
    let bliska = A[0];
    for(let x of A) {
        if(Math.abs(x - a) < Math.abs(bliska - a)) bliska = x;
    }
    out.innerText += "Najblizsza liczbie " + a + " to: " + bliska + "\n\n";


    let min = Math.min(...A);
    let idMin = A.indexOf(min);
    let poprz = (idMin > 0) ? A[idMin-1] : "brak";
    let nast = (idMin < 99) ? A[idMin+1] : "brak";
    out.innerText += "Min: " + min + " | Poprzednik: " + poprz + " | Nastepnik: " + nast + "\n\n";


    let wieksze10 = A.filter(x => x > 10);
    out.innerText += "Nowa tablica (tylko >10): " + wieksze10.join(", ") + "\n\n";


    let B = [];
    let s = 0;
    for(let i=0; i<100; i++) {
        s += A[i];
        B[i] = s;
    }
    out.innerText += "Tablica B (skumulowana): " + B.join(", ") + "\n\n";


    let malejaco = [...A].sort((x, y) => y - x);
    out.innerText += "Malejaco: " + malejaco.join(", ") + "\n\n";


    let ileRazy = {};
    for(let x of A) ileRazy[x] = (ileRazy[x] || 0) + 1;
    let min3 = [];
    for(let klucz in ileRazy) if(ileRazy[klucz] >= 3) min3.push(klucz);
    out.innerText += "Wystepuja min. 3 razy: " + min3.join(", ") + "\n\n";

  
    
 
    let fibo = [0, 1];
    for(let i=2; i<100; i++) fibo[i] = fibo[i-1] + fibo[i-2];
    out.innerText += "Fibonacci: " + fibo.join(", ") + "\n\n";

  
    let pot2 = [];
    for(let i=0; i<30; i++) pot2[i] = Math.pow(2, i); // do 30 bo potem brakuje skali w JS
    out.innerText += "Potegi 2: " + pot2.join(", ") + "\n\n";

 
    let c3 = [];
    for(let i=0; i<100; i++) c3[i] = (i+1)*3;
    out.innerText += "Ciag 3, 6, 9...: " + c3.join(", ") + "\n\n";

 
    let c2 = [];
    for(let i=0; i<30; i++) c2[i] = Math.pow(2, i+1);
    out.innerText += "Ciag 2, 4, 8...: " + c2.join(", ");
}
</script>
</body>
</html>
